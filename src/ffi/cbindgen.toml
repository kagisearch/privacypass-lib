# cbindgen configuration for generating C headers
language = "C"
include_guard = "KAGIPP_FFI_H"
autogen_warning = "/* Warning: This file is auto-generated by cbindgen. Do not modify. */"
include_version = true
namespace = "privacy_pass"
cpp_compat = true
style = "both"
no_includes = true
sys_includes = ["stdint.h"]
tab_width = 4
documentation = true
documentation_style = "c"

[export]
include = [
    "privacy_pass_token_request",
    "privacy_pass_token_finalization",
    "privacy_pass_free_string",
]

[export.rename]
"privacy_pass_token_request" = "privacy_pass_token_request"
"privacy_pass_token_finalization" = "privacy_pass_token_finalization"
"privacy_pass_free_string" = "privacy_pass_free_string"

[parse]
parse_deps = false
include = []

[fn]
# Don't mangle function names
rename_args = "None"
# Add must_use annotations
must_use = "const char*"
